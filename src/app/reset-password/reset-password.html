<div class="auth-page">
  <div class="auth-decoration auth-decoration-1"></div>
  <div class="auth-decoration auth-decoration-2"></div>

  <div class="auth-card animate-fade-in-up">
    <div class="auth-card-header">
      <div class="auth-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h2 class="auth-title">Reset Password</h2>
      <p class="auth-subtitle">Enter your details to reset your password</p>
    </div>

    <form #resetForm="ngForm" (ngSubmit)="resetPassword()" class="auth-form">

      <!-- User Id -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          User ID
        </label>
        <input
          type="number"
          class="form-input"
          [(ngModel)]="resetData.id"
          name="id"
          #id="ngModel"
          required
          placeholder="Enter your user ID">
        <div class="error-message" *ngIf="id.invalid && id.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          User ID is required
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          Email Address
        </label>
        <input
          type="email"
          class="form-input"
          [(ngModel)]="resetData.email"
          name="email"
          #email="ngModel"
          required
          email
          placeholder="name@example.com">
        <div class="error-message" *ngIf="email.invalid && email.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Enter a valid email address
        </div>
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          New Password
        </label>
        <input
          type="password"
          class="form-input"
          [(ngModel)]="resetData.newPassword"
          name="newPassword"
          #password="ngModel"
          required
          minlength="6"
          placeholder="Enter new password">
        <div class="error-message" *ngIf="password.invalid && password.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Password must be at least 6 characters
        </div>
      </div>

      <!-- Reset Button -->
      <button
        type="submit"
        class="btn-gradient btn-gradient-primary btn-block"
        [disabled]="resetForm.invalid">
        <span>Reset Password</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      </button>

    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <button
      type="button"
      class="btn-gradient btn-gradient-secondary btn-block"
      routerLink="/login">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      <span>Back to Login</span>
    </button>

    <div class="auth-footer">
      <span>Remember your password? </span>
      <a routerLink="/login" class="forgot-link">Sign In</a>
    </div>
  </div>
</div>
