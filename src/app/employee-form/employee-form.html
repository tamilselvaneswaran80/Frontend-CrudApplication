<div class="employee-form-page">

  <!-- Header -->
  <div class="form-header animate-fade-in-up">
    <div class="header-content">
      <div class="header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
        </svg>
      </div>
      <div class="header-text">
        <h2 class="header-title">{{ editId === null ? 'Add New Employee' : 'Edit Employee' }}</h2>
        <p class="header-subtitle">{{ editId === null ? 'Fill in the details to create a new employee record' : 'Update the employee details below' }}</p>
      </div>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card animate-fade-in-up">
    <div class="modern-form">
      <div class="form-row">
        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Name
          </label>
          <input type="text" class="field-input" [(ngModel)]="employee().name" name="name" placeholder="Enter employee name">
        </div>

        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Role
          </label>
          <select class="field-input" [(ngModel)]="employee().role" name="role">
            <option value="" disabled>Select role</option>
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
            Department
          </label>
          <select class="field-input" [(ngModel)]="employee().department" name="department">
            <option value="" disabled>Select department</option>
            <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
          </select>
        </div>

        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            Salary
          </label>
          <input type="number" class="field-input" [(ngModel)]="employee().salary" name="salary" min="0" placeholder="Enter salary">
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Created Date
          </label>
          <div class="field-display">{{ employee().createdDate | date:'dd/MM/yyyy hh:mm a' }}</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-gradient btn-secondary" (click)="cancel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          <span>Cancel</span>
        </button>

        <button type="button" class="btn-gradient btn-primary-gradient" (click)="saveEmployee()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>{{ editId === null ? 'Add Employee' : 'Update Employee' }}</span>
        </button>
      </div>
    </div>
  </div>

</div>
