<div class="container mt-4">

  <h3 class="text-center mb-4">Signup UserPage List (CRUD)</h3>

  <table class="table table-bordered table-striped">
    <thead class="thead-dark">
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Password</th>
        <th>PhoneNumber</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let u of users()">
        <td>{{u.id}}</td>
        <td>{{u.firstName}}</td>
        <td>{{u.lastName}}</td>
        <td>{{u.email}}</td>
        <td>{{u.password}}</td>
        <td>{{u.phoneNumber}}</td>
        <td>{{u.role}}</td>

        <td>
          <!-- <button class="btn btn-warning btn-sm mr-2"
                  (click)="editUser(u)">
            Edit
          </button>  -->

          <button class="btn btn-danger btn-sm"
                  (click)="deleteUser(u.id)">
            Delete
          </button>
        </td>
        
      </tr>
    </tbody>
  </table>
<button class="btn btn-primary" (click)="logout()">
    Logout
  </button>
</div>
