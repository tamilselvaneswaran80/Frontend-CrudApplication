<div class="student-form-page">

  <!-- Header -->
  <div class="form-header animate-fade-in-up">
    <div class="header-content">
      <div class="header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="header-text">
        <h2 class="header-title">{{ editId === null ? 'Add New Student' : 'Edit Student' }}</h2>
        <p class="header-subtitle">{{ editId === null ? 'Fill in the details to create a new student record' : 'Update the student details below' }}</p>
      </div>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card animate-fade-in-up">
    <div class="modern-form">
      <div class="form-row">
        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            First Name
          </label>
          <input type="text" class="field-input" [(ngModel)]="student().firstname" name="firstname" placeholder="Enter first name">
        </div>

        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Last Name
          </label>
          <input type="text" class="field-input" [(ngModel)]="student().lastname" name="lastname" placeholder="Enter last name">
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            Age
          </label>
          <input type="number" class="field-input" [(ngModel)]="student().age" name="age" min="1" max="120" placeholder="Enter age">
        </div>

        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            Course
          </label>
          <input type="text" class="field-input" [(ngModel)]="student().course" name="course" placeholder="Enter course name">
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
            Phone Number
          </label>
          <input type="text" class="field-input" [(ngModel)]="student().phoneNumber" name="phoneNumber" pattern="[0-9]{10}" maxlength="10" placeholder="10-digit number" #phone="ngModel">
          <div class="field-error" *ngIf="phone.invalid && phone.touched">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Only 10 digits allowed
          </div>
        </div>

        <div class="form-field">
          <label class="field-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Created Date
          </label>
          <div class="field-display">{{ student().createdDate | date:'dd/MM/yyyy hh:mm a' }}</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-gradient btn-secondary" (click)="cancel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          <span>Cancel</span>
        </button>

        <button type="button" class="btn-gradient btn-primary-gradient" (click)="saveStudent()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>{{ editId === null ? 'Add Student' : 'Update Student' }}</span>
        </button>
      </div>
    </div>
  </div>

</div>
