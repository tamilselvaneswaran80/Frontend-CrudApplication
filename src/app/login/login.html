<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width: 450px;">

    <h3 class="text-center mb-4">Login Page</h3>

    <form #loginForm="ngForm" (ngSubmit)="login()">

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>

        <input
          type="email"
          class="form-control"
          name="email"
          [(ngModel)]="loginData.email"
          #email="ngModel"
          required
          email
          placeholder="Enter email">

        <!-- Error Message -->
        <small class="text-danger" *ngIf="email.invalid && email.touched">
          Please enter a valid email
        </small>

      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>

        <input
          type="password"
          class="form-control"
          name="password"
          [(ngModel)]="loginData.password"
          #password="ngModel"
          required
          minlength="4"
          placeholder="Enter password">

        <small class="text-danger" *ngIf="password.invalid && password.touched">
          Password is required
        </small>

      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loginForm.invalid">
        Login
      </button>

    </form>

    <hr>

<button
type="button"
class="btn btn-warning text-dark btn-block"
(click)="goToSignup()">
Create Account (Signup)
</button>

<div class="text-right mb-5">
  <a
    type="button"
    class="btn btn-link p-0"
    routerLink="/reset-password">
    Forgot Password?
</a>
</div>

</div>
