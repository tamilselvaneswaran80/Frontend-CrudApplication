<div class="auth-page">
  <div class="auth-decoration auth-decoration-1"></div>
  <div class="auth-decoration auth-decoration-2"></div>

  <div class="auth-card animate-fade-in-up">
    <div class="auth-card-header">
      <div class="auth-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <line x1="20" y1="8" x2="20" y2="14"></line>
          <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
      </div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Fill in your details to get started</p>
    </div>

    <form #signupForm="ngForm" (ngSubmit)="signup()" class="auth-form">

      <!-- First Name -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          First Name
        </label>
        <input
          type="text"
          class="form-input"
          [(ngModel)]="user.firstName"
          name="firstName"
          #firstName="ngModel"
          required
          placeholder="John">
        <div class="error-message" *ngIf="firstName.invalid && firstName.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          First name is required
        </div>
      </div>

      <!-- Last Name -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Last Name
        </label>
        <input
          type="text"
          class="form-input"
          [(ngModel)]="user.lastName"
          name="lastName"
          #lastName="ngModel"
          required
          placeholder="Doe">
        <div class="error-message" *ngIf="lastName.invalid && lastName.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Last name is required
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          Email Address
        </label>
        <input
          type="email"
          class="form-input"
          [(ngModel)]="user.email"
          name="email"
          #email="ngModel"
          required
          email
          placeholder="john@example.com">
        <div class="error-message" *ngIf="email.invalid && email.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Enter a valid email address
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Password
        </label>
        <input
          type="password"
          class="form-input"
          [(ngModel)]="user.password"
          name="password"
          #password="ngModel"
          required
          minlength="6"
          placeholder="Create a password">
        <div class="error-message" *ngIf="password.invalid && password.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Password must be at least 6 characters
        </div>
      </div>

      <!-- Phone Number -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          Phone Number
        </label>
        <input
          type="tel"
          class="form-input"
          [(ngModel)]="user.phoneNumber"
          name="phoneNumber"
          #phoneNumber="ngModel"
          required
          pattern="^[0-9]{10}$"
          placeholder="1234567890">
        <div class="error-message" *ngIf="phoneNumber.invalid && phoneNumber.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Phone number must be 10 digits
        </div>
      </div>

      <!-- Role -->
      <div class="form-group">
        <label class="form-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
          Role
        </label>
        <select
          class="form-input"
          [(ngModel)]="user.role"
          name="role"
          #role="ngModel"
          required>
          <option value="" disabled selected>Select your role</option>
          <option value="admin">Admin</option>
          <option value="user">Teacher</option>
          <option value="manager">Student</option>
        </select>
        <div class="error-message" *ngIf="role.invalid && role.touched">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          Role is required
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn-gradient btn-gradient-primary btn-block"
        [disabled]="signupForm.invalid">
        <span>Create Account</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <button
      type="button"
      class="btn-gradient btn-gradient-secondary btn-block"
      (click)="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
      <span>Back to Sign In</span>
    </button>

    <div class="auth-footer">
      <span>Already have an account? </span>
      <a (click)="goBack()" class="forgot-link" style="cursor: pointer;">Sign In</a>
    </div>
  </div>
</div>
