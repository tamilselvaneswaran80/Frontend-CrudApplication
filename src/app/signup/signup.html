<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width:450px;">

    <h3 class="text-center mb-4">Signup Page</h3>

    <form #signupForm="ngForm" (ngSubmit)="signup()">

      <!-- First Name -->
      <div class="form-group">
        <label>First Name</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="user.firstName"
          name="firstName"
          #firstName="ngModel"
          required
          placeholder="Enter First Name" style="border-radius: 50px;">

        <small class="text-danger" *ngIf="firstName.invalid && firstName.touched">
          First name is required
        </small>
      </div>

      <!-- Last Name -->
      <div class="form-group">
        <label>Last Name</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="user.lastName"
          name="lastName"
          #lastName="ngModel"
          required
          placeholder="Enter Last Name" style="border-radius: 50px;">

        <small class="text-danger" *ngIf="lastName.invalid && lastName.touched">
          Last name is required
        </small>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="user.email"
          name="email"
          #email="ngModel"
          required
          email
          placeholder="Enter Email" style="border-radius: 50px;">

        <small class="text-danger" *ngIf="email.invalid && email.touched">
          Enter a valid email
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="user.password"
          name="password"
          #password="ngModel"
          required
          minlength="6"
          placeholder="Enter Password" style="border-radius: 50px;">

        <small class="text-danger" *ngIf="password.invalid && password.touched">
          Password must be at least 6 characters
        </small>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label>Phone Number</label>
        <input
          type="tel"
          class="form-control"
          [(ngModel)]="user.phoneNumber"
          name="phoneNumber"
          #phone="ngModel"
          required
          pattern="^[0-9]{10}$"
          placeholder="Enter Phone Number" style="border-radius: 50px;">

        <small class="text-danger" *ngIf="phone.invalid && phone.touched">
          Phone number must be 10 digits
        </small>
      </div>
<div class="form-group">
  <label>Role</label>

  <select
    class="form-control"
    [(ngModel)]="user.role"
    name="role"
    required style="border-radius: 15px;">

    <option value="">-- Select Role --</option>
    <option value="Admin">Admin</option>
    <option value="Teacher">Teacher</option>
    <option value="Student">Student</option>

  </select>

  <small class="text-danger"
         *ngIf="!user.role">
    Role is required
  </small>
</div>
      <!-- Signup Button -->
      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="signupForm.invalid" style="border-radius: 50px;">
        Signup
      </button>

      <hr>

      <!-- Login Button -->
      <button
        type="button"
        class="btn btn-secondary btn-block"
        (click)="goBack()" style="border-radius: 50px;">
        Back to Login
      </button>

    </form>

  </div>

</div>
