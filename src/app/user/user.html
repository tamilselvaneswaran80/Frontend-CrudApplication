<div class="container mt-4">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<h2 class="mb-4">Student CRUD</h2>

<!-- Student ID -->
<div class="form-group row">
<label class="col-sm-2 col-form-label">Student ID</label>
<div class="col-sm-6">
<input type="text"
[(ngModel)]="studentlist().studentId"
class="form-control">
</div>
</div>

<!-- First Name -->
<div class="form-group row">
<label class="col-sm-2 col-form-label">First Name</label>
<div class="col-sm-6">
<input type="text"
[(ngModel)]="studentlist().firstname"
class="form-control">
</div>
</div>

<!-- Last Name -->
<div class="form-group row">
<label class="col-sm-2 col-form-label">Last Name</label>
<div class="col-sm-6">
<input type="text"
[(ngModel)]="studentlist().lastname"
class="form-control">
</div>
</div>

<!-- Age -->
<div class="form-group row">
<label class="col-sm-2 col-form-label">Age</label>
<div class="col-sm-6">
<input type="number"
[(ngModel)]="studentlist().age"
class="form-control">
</div>
</div>

<!-- Course -->
<div class="form-group row">
<label class="col-sm-2 col-form-label">Course</label>
<div class="col-sm-6">
<input type="text"
[(ngModel)]="studentlist().course"
class="form-control">
</div>
</div>

<!-- Phone Number -->
<div class="form-group row">
<label class="col-sm-2 col-form-label">Phone Number</label>
<div class="col-sm-6">
<input type="text"
[(ngModel)]="studentlist().phoneNumber"
class="form-control">
</div>
</div>

<!-- Button -->
<div class="form-group row">
<div class="col-sm-2"></div>
<div class="col-sm-6">
<button class="btn btn-primary" (click)="saveStudent()">
{{ editIndex === null ? 'Add Student' : 'Update Student' }}
</button>
</div>
</div>

<hr>

<table class="table table-bordered mt-3">

<thead class="thead-dark">
<tr>
<th>ID</th>
<th>FirstName</th>
<th>LastName</th>
<th>Age</th>
<th>Course</th>
<th>PhoneNumber</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let s of students; let i=index">
<td>{{i+1}}</td>
<td>{{s.firstname}}</td>
<td>{{s.lastname}}</td>
<td>{{s.age}}</td>
<td>{{s.course}}</td>
<td>{{s.phoneNumber}}</td>

<td>
<button class="btn btn-warning btn-sm mr-2"
(click)="editStudent(i)">
Edit
</button>

<button class="btn btn-danger btn-sm"
(click)="deleteStudent(i)">
Delete
</button>
</td>

</tr>

</tbody>

</table>

</div>
